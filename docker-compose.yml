version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: citymind
      POSTGRES_PASSWORD: citymind
      POSTGRES_DB: citymind
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citymind -d citymind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A tasks.app worker --loglevel=INFO
    env_file: .env
    depends_on:
      - redis
      - db
    volumes:
      - .:/app

volumes:
  db_data:
