name: tests

on:
  push:
    branches: [main]
  pull_request:

# Older runs for the same ref get cancelled when a new push arrives.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run pytest
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          # Keep CI runs deterministic — no real env secrets leak into tests.
          DATABASE_URL: ""
          REDIS_URL: ""
          VK_API_TOKEN: ""
          TELEGRAM_API_ID: ""
          TELEGRAM_API_HASH: ""
          DEEPSEEK_API_KEY: ""
          OPENWEATHER_API_KEY: ""
          # DEMO_MODE по умолчанию true (продакшн без активации) — но
          # юнит-тесты проверяют реальные ветки кода, а не early-return.
          DEMO_MODE: "false"
        run: pytest tests/ -v --tb=short
